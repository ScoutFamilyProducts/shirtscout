<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShirtScout – Find shirts. Not noise.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1B0A30;
      color: #F5F2FA;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .container { max-width: 560px; }
    .logo {
      font-size: 42px;
      font-weight: 800;
      color: #7CFF5B;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 20px;
      color: #F5F2FA;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: #B9AEC9;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: #2A0E4A;
      border: 1px solid #7CFF5B44;
      color: #7CFF5B;
      font-size: 12px;
      padding: 8px 20px;
      border-radius: 99px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .stores {
      margin-top: 36px;
      font-size: 12px;
      color: #B9AEC9;
    }
    .stores span {
      margin: 0 8px;
      color: #B388FF;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ShirtScout</div>
    <div class="tagline">Find shirts. Not noise.</div>
    <div class="sub">
      No social required. No algorithm nonsense.<br/>
      Search shirts across top retailers in one place.
    </div>
    <div class="badge">Coming Soon</div>
    <div class="stores">
      Searching across <span>Walmart</span> <span>eBay</span> <span>Amazon</span>
    </div>
  </div>
</body>
</html>
